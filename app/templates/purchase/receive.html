{% extends "layouts/base.html" %}
{% block content %}
<h4>Receive {{ order.order_number }}</h4>
<div class="card"><div class="card-body">
    <table class="table table-dark">
        <thead><tr><th>Product</th><th>Ordered</th><th>Received</th></tr></thead>
        <tbody>{% for line in order.lines %}
            <tr><td>{{ line.product.name }}</td><td>{{ line.quantity }}</td><td>{{ line.received_qty }}</td></tr>{% endfor %}
        </tbody>
    </table>
    <form method="POST">
        <button class="btn btn-primary"><i class="bi bi-inbox"></i> Receive All</button>
        <a href="{{ url_for('purchase.view_order', id=order.id) }}" class="btn btn-secondary">Cancel</a>
    </form>
</div></div>
{% endblock %}
