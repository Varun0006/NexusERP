{% extends "layouts/base.html" %}

{% block title %}AI Operations Copilot{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-4">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
        <div>
            <h2 class="mb-1">AI Operations Copilot</h2>
            <p class="text-secondary mb-0">Ask live questions about shortages, delays, and production priorities.</p>
        </div>
        <div id="copilot-kpis" class="d-flex flex-wrap gap-2"></div>
    </div>

    <div class="card glass-card border-info" style="min-height: 70vh;">
        <div id="chat-container" class="card-body overflow-auto" style="max-height: 60vh;"></div>
        <div class="card-footer border-0 pt-0 pb-3 px-3">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button type="button" class="btn btn-outline-info btn-sm" onclick="fillMessage('Which products are running low?')">Which products are running low?</button>
                <button type="button" class="btn btn-outline-info btn-sm" onclick="fillMessage('What should I manufacture today?')">What should I manufacture today?</button>
                <button type="button" class="btn btn-outline-info btn-sm" onclick="fillMessage('Show inventory shortages.')">Show inventory shortages.</button>
                <button type="button" class="btn btn-outline-info btn-sm" onclick="fillMessage('Why is this order delayed?')">Why is this order delayed?</button>
            </div>
            <form id="chat-form" class="d-flex gap-2" onsubmit="sendMessage(event)">
                <input
                    type="text"
                    id="chat-input"
                    class="form-control"
                    placeholder="Type your question..."
                    autocomplete="off"
                    required
                >
                <button type="submit" id="send-btn" class="btn btn-info text-dark fw-semibold">Send</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const kpiWrap = document.getElementById('copilot-kpis');

    function escapeHtml(value) {
        return (value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatText(value) {
        const safe = escapeHtml(value);
        return safe
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
    }

    function fillMessage(text) {
        chatInput.value = text;
        chatInput.focus();
    }

    function appendMessage(text, isUser = false) {
        const row = document.createElement('div');
        row.className = 'd-flex mb-3 ' + (isUser ? 'justify-content-end' : 'justify-content-start');

        const bubble = document.createElement('div');
        bubble.className = isUser
            ? 'px-3 py-2 rounded-3 bg-info text-dark'
            : 'px-3 py-2 rounded-3 bg-dark-subtle border border-secondary-subtle';
        bubble.style.maxWidth = '78%';
        bubble.innerHTML = '<div class="small mb-0">' + formatText(text) + '</div>';

        row.appendChild(bubble);
        chatContainer.appendChild(row);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function appendLoading() {
        const row = document.createElement('div');
        row.className = 'd-flex mb-3 justify-content-start';
        row.id = 'copilot-loading';
        row.innerHTML = '<div class="px-3 py-2 rounded-3 bg-dark-subtle border border-secondary-subtle small">Analyzing live ERP data...</div>';
        chatContainer.appendChild(row);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeLoading() {
        const node = document.getElementById('copilot-loading');
        if (node) {
            node.remove();
        }
    }

    function renderKpis(data) {
        kpiWrap.innerHTML = '';
        const cards = [
            ['Low Stock', data.low_stock_items_count],
            ['Open Sales', data.open_sales_orders],
            ['Delayed Sales', data.delayed_sales_orders],
            ['Active MOs', data.active_manufacturing_orders],
            ['Open POs', data.open_purchase_orders]
        ];

        for (const [label, value] of cards) {
            const badge = document.createElement('span');
            badge.className = 'badge rounded-pill text-bg-dark border border-info-subtle px-3 py-2';
            badge.textContent = label + ': ' + value;
            kpiWrap.appendChild(badge);
        }
    }

    async function loadContext() {
        try {
            const response = await fetch('/copilot/api/context');
            if (!response.ok) {
                return;
            }
            const data = await response.json();
            renderKpis(data);
        } catch (error) {
            // Context badges are optional in case of temporary API issues.
        }
    }

    async function sendMessage(event) {
        event.preventDefault();
        const message = chatInput.value.trim();
        if (!message) {
            return;
        }

        appendMessage(message, true);
        chatInput.value = '';
        chatInput.disabled = true;
        sendBtn.disabled = true;
        appendLoading();

        try {
            const response = await fetch('/copilot/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            removeLoading();

            if (!response.ok) {
                appendMessage(data.error || 'Unable to process your request right now.');
            } else {
                appendMessage(data.response || 'No response generated.');
                await loadContext();
            }
        } catch (error) {
            removeLoading();
            appendMessage('Sorry, an error occurred while connecting to Copilot.');
        } finally {
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    appendMessage("Hello! I'm your NexusERP Copilot. Ask me about low stock, manufacturing priorities, delayed orders, or shortages.");
    loadContext();
</script>
{% endblock %}
