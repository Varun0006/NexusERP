{% extends "layouts/base.html" %}
{% block title %}Reports - NexusERP{% endblock %}
{% block content %}
<h4><i class="bi bi-file-earmark-bar-graph"></i> Reports</h4>
<div class="row g-3">
    <div class="col-md-4">
        <div class="card"><div class="card-body text-center">
            <i class="bi bi-cart display-3"></i>
            <h5 class="mt-2">Sales Report</h5>
            <a href="{{ url_for('reports.sales_report') }}" class="btn btn-outline-primary">View</a>
        </div></div>
    </div>
    <div class="col-md-4">
        <div class="card"><div class="card-body text-center">
            <i class="bi bi-archive display-3"></i>
            <h5 class="mt-2">Inventory Valuation</h5>
            <a href="{{ url_for('reports.inventory_valuation') }}" class="btn btn-outline-primary">View</a>
        </div></div>
    </div>
    <div class="col-md-4">
        <div class="card"><div class="card-body text-center">
            <i class="bi bi-graph-up display-3"></i>
            <h5 class="mt-2">Analytics Dashboard</h5>
            <a href="{{ url_for('analytics.dashboard') }}" class="btn btn-outline-primary">View</a>
        </div></div>
    </div>
</div>
{% endblock %}
