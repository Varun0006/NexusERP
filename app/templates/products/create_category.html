{% extends "layouts/base.html" %}
{% block content %}
<h4>New Category</h4>
<div class="card"><div class="card-body">
    <form method="POST">
        {{ form.hidden_tag() }}
        <div class="mb-3">{{ form.name.label }}{{ form.name(class="form-control") }}</div>
        <div class="mb-3">{{ form.description.label }}{{ form.description(class="form-control", rows=3) }}</div>
        {{ form.submit(class="btn btn-primary") }}
        <a href="{{ url_for('products.list_categories') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div></div>
{% endblock %}
